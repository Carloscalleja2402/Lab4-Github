name: Secure Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test application
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Show safe variable
        run: echo "Application name is ${{ vars.APP_NAME }}"

      - name: Verify secrets are available without exposing them
        run: |
          if [ -z "${{ secrets.API_KEY }}" ]; then
            echo "API_KEY is not configured"
            exit 1
          fi

          echo "API_KEY is configured but will not be printed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-build
          path: dist/
          retention-days: 7

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-build
          path: dist/

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ vars.APP_NAME }} to staging"
          npm run deploy:staging

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - deploy-staging

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-build
          path: dist/

      - name: Validate deployment secret without exposing it
        run: |
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then
            echo "DEPLOY_TOKEN is not configured"
            exit 1
          fi

          echo "DEPLOY_TOKEN is configured but will not be printed"

      - name: Deploy to production
        run: |
          echo "Deploying ${{ vars.APP_NAME }} to production"
          npm run deploy:production